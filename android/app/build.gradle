plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
// it is file('local.properties') for deploying using local terminal. might be file('../android/local.properties') for github actions.
def localPropertiesFile = rootProject.file('./android/local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keyProperties = new Properties()
// it is file('key.properties') for deploying using local terminal. might be file('../android/key.properties') for github actions.
def keyPropertiesFile = rootProject.file('./android/key.properties')
if (keyPropertiesFile.exists()) {
    keyPropertiesFile.withReader('UTF-8') { reader ->
        keyProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace 'dk.cachet.carp_study_app'
    compileSdkVersion 34
    ndkVersion flutter.ndkVersion

    // compileOptions {
    //     sourceCompatibility JavaVersion.VERSION_17
    //     targetCompatibility JavaVersion.VERSION_17
    // }

    // kotlinOptions {
    //     jvmTarget = '17'
    // }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "dk.cachet.carp_study_app"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion 28
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    // This is to be used for deployment only when we manually run fastlane beta from the terminal locally.
    signingConfigs {
        release {
            storeFile keyProperties.getProperty('storeFile')
            storePassword keyProperties.getProperty('storePassword')
            keyAlias keyProperties.getProperty('keyAlias')
            keyPassword keyProperties.getProperty('keyPassword')
        }
    }

    // // This is to be used for deployment by github actions trying to run fastlane. This not work.
    //  signingConfigs {
    //     release {
    //         storeFile file('../app/upload-keystore.jks') ? file('../app/upload-keystore.jks') : null
    //         storePassword keyProperties.getProperty('storePassword')
    //         keyAlias keyProperties.getProperty('keyAlias')
    //         keyPassword keyProperties.getProperty('keyPassword')
    //     }
    //  }


    buildTypes {
        release {
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
