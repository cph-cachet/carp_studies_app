plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
// it is file('../local.propertieslocal.properties') for deploying using local terminal. file('./android/local.properties') for github actions.
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keyProperties = new Properties()
// it is file('../key.properties') for deploying using local terminal. and file('./android/key.properties') for github actions.
def keyPropertiesFile = rootProject.file('key.properties')
if (keyPropertiesFile.exists()) {
    keyPropertiesFile.withReader('UTF-8') { reader ->
        keyProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    print("flutterVersionCode is null and going to be 1 wtf")
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    print("flutterVersionName is null and going to be '1.0' wtf")
    flutterVersionName = '1.0'
}

android {
    namespace "com.cachet.carp_studies_app"
    compileSdkVersion 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "dk.cachet.carp_study_app"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion 28
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    // This is to be used for deployment only when we manually run fastlane beta from the terminal locally.
    signingConfigs {
        release {
            // storeFile file('../fastlane/upload-keystore.jks') ? file('../fastlane/upload-keystore.jks') : null
            storeFile file(keyProperties.getProperty('storeFile')) ? file(keyProperties.getProperty('storeFile')) : null
            storePassword keyProperties.getProperty('storePassword')
            keyAlias keyProperties.getProperty('keyAlias')
            keyPassword keyProperties.getProperty('keyPassword')
        }
    }

    // // This is to be used for deployment by github actions trying to run fastlane. This not work.
    //  signingConfigs {
    //     release {
    //         storeFile file('../app/upload-keystore.jks') ? file('../app/upload-keystore.jks') : null
    //         storePassword keyProperties.getProperty('storePassword')
    //         keyAlias keyProperties.getProperty('keyAlias')
    //         keyPassword keyProperties.getProperty('keyPassword')
    //     }
    //  }


    buildTypes {
        release {
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
